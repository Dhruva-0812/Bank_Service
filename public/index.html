<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — SecureBank</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

    <div class="auth-card">
        <div class="brand">
            <div class="brand-icon">🏦</div>
            <h1>SecureBank</h1>
            <p>Sign in to manage your account</p>
        </div>

        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
            </div>

            <div class="auth-actions">
                <button type="submit" class="btn btn-primary">Sign In</button>
                <a href="register.html" class="btn btn-outline" style="display:block;text-align:center;text-decoration:none;line-height:1.4;">Create New Account</a>
            </div>
        </form>
    </div>

    <script src="auth.js"></script>
</body>
</html>
